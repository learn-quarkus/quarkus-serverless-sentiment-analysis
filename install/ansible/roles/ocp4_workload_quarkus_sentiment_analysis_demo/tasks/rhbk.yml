---

- name: "Ensure rhsso namespace exists"
  kubernetes.core.k8s:
    state: present
    api_version: v1
    kind: Namespace
    name: "{{ ocp4_workload_quarkus_sentiment_analysis_rhbk_namespace }}"

- name: Deploy RHSSO Application
  kubernetes.core.k8s:
    state: present
    definition: "{{ lookup('template', 'application/rhbk-application.yaml.j2') | from_yaml }}"
